  // 3. Polling for Thulium Widget initialization
  function waitForThulium() {
    let attempts = 0;
    const maxAttempts = 20;
    const check = setInterval(() => {
      if (window._tc && typeof window._tc === "function") {
        clearInterval(check);
        window._tc('event_listener', function(event) {
          const eventsMap = {
            callback_scheduled: 'th_callback_scheduled',
            callback_created: 'th_callback_created'
          };
          if (eventsMap[event.name]) {
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({
              event: eventsMap[event.name],
              page: location.href
            });
            gtag_report_conversion();
          }
        });
      } else if (attempts >= maxAttempts) {
        clearInterval(check); // Give up to prevent endless resource leaking
      }
      attempts++;
    }, 500);
  }
  // 4. Clean Event Management
  function removeListeners() {
    window.removeEventListener('scroll', injectThirdPartyScripts);
    window.removeEventListener('mousemove', injectThirdPartyScripts);
    window.removeEventListener('touchstart', injectThirdPartyScripts);
    window.removeEventListener('click', injectThirdPartyScripts);
  }
  window.addEventListener('scroll', injectThirdPartyScripts, {once: true});
  window.addEventListener('mousemove', injectThirdPartyScripts, {once: true});
  window.addEventListener('touchstart', injectThirdPartyScripts, {once: true});
  window.addEventListener('click', injectThirdPartyScripts, {once: true});
  // Fallback if user is completely idle
  window.addEventListener('load', () => {
    setTimeout(injectThirdPartyScripts, 6000);
  });
  // 5. Streamlined Click Tracking via Event Delegation / Array maps
  document.addEventListener('DOMContentLoaded', function () {
    const phoneSelectors = [
      '.footer_mobile_phone',
      '.footer_phone',
      '.kontakt_phone',
      '.kontakt_mobile_phone'
    ];
    phoneSelectors.forEach(selector => {
      const element = document.querySelector(selector);
      if (element) {
        element.addEventListener('click', function () {
          console.log(`Element ${selector} clicked`);
          gtag_report_conversion();
        });
      }
    });
  });
})();
</script>
